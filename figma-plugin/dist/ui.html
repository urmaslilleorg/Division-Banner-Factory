      background-position: right 10px center;
      padding-right: 28px;

    select:focus, input:focus {
      border-color: #6366f1;
      background: #fff;
    }

    select:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .field { margin-bottom: 12px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;

    .btn-row { display: flex; gap: 8px; margin-top: 4px; }

      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.4;

      border: 1px solid #e4e4e7;

      border-radius: 2px;

      border: 1px solid #e4e4e7;
      border-radius: 6px;

      color: #555;
      padding: 0 2px;
    }

    .btn-apply-updates { background: #6366f1; color: #fff; }
    .btn-apply-updates:hover:not(:disabled) { background: #4f46e5; }
  </style>
</head>
